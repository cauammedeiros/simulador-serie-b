name: Atualizar Simulador
on:
  schedule:
    - cron: '0 8 * * *' # Roda todo dia às 08:00
  workflow_dispatch: # Permite que tu forces a atualização manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Rodar Simulador
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          javac *.java
          java Main
          
      - name: Deploy do HTML
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
