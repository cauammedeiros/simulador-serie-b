name: Atualizar Simulador
on:
  schedule:
    - cron: '0 8 * * 2' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Rodar Simulador
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_HOST: ${{ secrets.API_HOST }}
        run: |
          javac *.java
          java Main
          
      - name: Preparar Pagina
        run: |
          mkdir -p _site
          cp relatorio_simulacao.html _site/index.html
          
      - name: Upload das paginas
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
